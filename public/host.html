<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buzzer — Host</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="host-body">
  <div class="host-container">
    <!-- Header -->
    <header class="host-header">
      <div class="theme-selector">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="default">Default</option>
          <option value="easter">🐣 Easter</option>
          <option value="neon">⚡ Neon</option>
          <option value="ocean">🌊 Ocean</option>
        </select>
      </div>
      <h1>🎯 Buzzer</h1>
      <div class="connection-info">
        <div class="qr-section">
          <img id="qr-code" alt="QR Code" />
        </div>
        <div class="join-details">
          <p class="join-url" id="join-url"></p>
          <p class="room-code">Room: <span id="room-code">----</span></p>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <div class="host-controls">
      <button id="btn-reset" class="btn btn-reset">Reset Round</button>
      <button id="btn-reset-scores" class="btn btn-reset-scores">Reset Scores</button>
      <button id="btn-chance-toggle" class="btn btn-chance">Enable Chance</button>
      <span id="chance-state" class="chance-state">Chance: Off</span>
    </div>

    <section class="chance-bets-section">
      <h2>Chance Bets</h2>
      <div class="chance-bets-list" id="chance-bets-list">
        <p class="no-players">No bets yet</p>
      </div>
    </section>

    <!-- Buzz results -->
    <section class="buzz-results" id="buzz-results">
      <div class="waiting-message" id="waiting-message">
        Waiting for buzzes...
      </div>
    </section>

    <!-- Leaderboard -->
    <section class="leaderboard-section">
      <h2>Leaderboard</h2>
      <div class="leaderboard-list" id="leaderboard-list">
        <p class="no-players">No scores yet</p>
      </div>
    </section>

    <!-- Players -->
    <section class="players-section">
      <h2>Players <span id="player-count" class="player-count">0</span></h2>
      <div class="player-list" id="player-list">
        <p class="no-players">No players connected yet</p>
      </div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/host.js"></script>
</body>
</html>
