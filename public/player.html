<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Buzzer</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="player-body">

  <!-- Join screen -->
  <div class="player-join" id="join-screen">
    <h1>🎯 Buzzer</h1>
    <form id="join-form">
      <input
        type="text"
        id="name-input"
        placeholder="Your name"
        maxlength="30"
        autocomplete="off"
        required
      />
      <button type="submit" class="btn btn-join">Join</button>
    </form>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <!-- Buzzer screen -->
  <div class="player-buzzer hidden" id="buzzer-screen">
    <p class="player-name" id="display-name"></p>
    <p class="player-score" id="player-score">Score: 0 pts</p>

    <form class="chance-bet hidden" id="chance-bet-form">
      <label for="chance-bet-input">Points to bet</label>
      <input type="number" id="chance-bet-input" min="1" step="1" inputmode="numeric" />
      <button type="button" class="btn btn-chance-submit" id="chance-lock-btn">Lock In Points</button>
      <label for="chance-answer-input" id="chance-answer-label" class="hidden">Your Answer</label>
      <textarea id="chance-answer-input" rows="3" maxlength="500" placeholder="Type your answer here" class="hidden"></textarea>
      <button type="submit" class="btn btn-chance-submit hidden" id="chance-submit-btn">Submit Answer</button>
      <p class="chance-bet-status" id="chance-bet-status"></p>
    </form>

    <button id="buzz-btn" class="buzz-button">BUZZ!</button>
    <p class="buzz-status" id="buzz-status"></p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/player.js"></script>
</body>
</html>
